<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Job Application Test Form</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 40px auto;
}

.section {
    margin-bottom: 30px;
    padding: 20px;
    border: 1px solid #ddd;
}

label {
    display: block;
    margin-top: 12px;
}

input,
textarea,
select {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    box-sizing: border-box;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
}
</style>
</head>

<body>

<h1>Job Application Form</h1>

<form id="jobForm">
<a href="./otherform.html">Difficult form</a> 

<div class="section">
<h2>Personal Information</h2>

<label for="fullName">Full Name</label>
<input id="fullName" name="fullName">

<label for="email">Email Address</label>
<input id="email" name="email">

<label for="phone">Phone Number</label>
<input id="phone" name="phone">

<label for="address">Address</label>
<input id="address" name="address">

<label for="city">City</label>
<input id="city" name="city">

<label for="state">State</label>
<input id="state" name="state">

<label for="country">Country</label>
<input id="country" name="country">
</div>

<div class="section">
<h2>Professional Details</h2>

<label for="linkedin">LinkedIn Profile</label>
<input id="linkedin" name="linkedin">

<label for="github">GitHub Profile</label>
<input id="github" name="github">

<label for="portfolio">Portfolio Website</label>
<input id="portfolio" name="portfolio">

<label for="experience">Work Experience</label>
<textarea id="experience" name="experience"></textarea>

<label for="education">Education</label>
<textarea id="education" name="education"></textarea>

<label for="currentRole">Current Role</label>
<input id="currentRole" name="currentRole">

<label for="currentCompany">Current Company</label>
<input id="currentCompany" name="currentCompany">
</div>

<div class="section">
<h2>Application Details</h2>

<label for="salary">Expected Salary</label>
<input id="salary" name="expectedSalary">

<label for="notice">Notice Period</label>
<input id="notice" name="noticePeriod">

<label for="coverLetter">Cover Letter</label>
<textarea id="coverLetter" name="coverLetter"></textarea>
</div>

<button type="submit">Submit Application</button>

</form>

</body>
</html>
